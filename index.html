<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북 큐레이션 노트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Pen+Script&display=swap');

  :root{
    --paper:#f4ecd8; --paper-edge:#e7dcc0;
    --ink:#3a3226; --ink-soft:#6b5f4c;
    --line:#c9b98f; --margin:#c98a86; --accent:#8a6d3b;
    --card:#fbf6e9;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;min-height:100%;
    background:radial-gradient(circle at 30% 20%, #6b5b48 0%, #4a3f30 55%, #3a3126 100%);
    font-family:'Gowun Batang',serif;color:var(--ink);
  }
  .wrap{max-width:820px;margin:0 auto;padding:34px 18px 90px;}

  /* ===== 종이 ===== */
  .sheet{
    position:relative;background:var(--paper);border-radius:4px;
    padding:52px 56px 60px;
    box-shadow:0 2px 4px rgba(0,0,0,.25),0 18px 50px rgba(0,0,0,.45);
    background-image:
      radial-gradient(circle at 15% 30%, rgba(0,0,0,.03) 0, transparent 60%),
      radial-gradient(circle at 85% 70%, rgba(0,0,0,.04) 0, transparent 55%),
      linear-gradient(180deg,#f6efdd,#efe6cf);
  }
  .sheet::before{
    content:"";position:absolute;top:0;right:0;
    border-width:0 34px 34px 0;border-style:solid;
    border-color:transparent var(--paper-edge) transparent transparent;
    box-shadow:-3px 3px 6px rgba(0,0,0,.15);
  }

  /* ===== 책 정보 ===== */
  .kicker{
    font-family:'Nanum Pen Script',cursive;font-size:26px;
    color:var(--accent);margin-bottom:6px;
  }
  .book-title{
    font-size:34px;font-weight:700;line-height:1.25;letter-spacing:-.5px;
    outline:none;
  }
  .book-title:empty::before{content:attr(data-ph);color:var(--ink-soft);opacity:.4;}
  .book-author{
    font-size:17px;color:var(--ink-soft);margin-top:6px;outline:none;
  }
  .book-author:empty::before{content:attr(data-ph);color:var(--ink-soft);opacity:.4;}
  .rule{height:2px;background:linear-gradient(90deg,var(--accent),transparent);
    margin:18px 0 20px;opacity:.6;}

  .cur-label{font-size:13px;letter-spacing:2px;color:var(--accent);
    text-transform:uppercase;margin-bottom:8px;}
  .cur-msg{
    position:relative;font-size:21px;line-height:1.9;padding:4px 6px 4px 30px;
    outline:none;min-height:60px;
  }
  .cur-msg::before{
    content:"“";position:absolute;left:-4px;top:-6px;
    font-size:52px;color:var(--accent);opacity:.5;
    font-family:'Gowun Batang',serif;
  }
  .cur-msg:empty::before{
    /* keep quote mark; placeholder handled by sibling */
  }
  .cur-msg[data-empty="1"]::after{
    content:attr(data-ph);color:var(--ink-soft);opacity:.4;
  }
  .recommender{
    text-align:right;margin-top:10px;font-family:'Nanum Pen Script',cursive;
    font-size:24px;color:var(--ink-soft);outline:none;
  }
  .recommender:empty::before{content:attr(data-ph);opacity:.4;}

  .admin-row{margin-top:18px;display:flex;gap:8px;align-items:center;}
  .save-book{display:none;}

  /* ===== 댓글(감상) ===== */
  .comments{margin-top:40px;}
  .comments h2{
    font-size:20px;font-weight:700;color:var(--ink);
    display:flex;align-items:baseline;gap:10px;margin:0 0 4px;
  }
  .comments h2 .cnt{font-size:15px;color:var(--ink-soft);font-weight:400;}
  .thread-rule{height:1px;background:var(--line);opacity:.7;margin:12px 0 20px;}

  .comment{
    position:relative;background:var(--card);border:1px solid #e3d6b3;
    border-radius:10px;padding:14px 18px;margin-bottom:14px;
    box-shadow:0 1px 2px rgba(0,0,0,.06);
  }
  .comment .who{font-weight:700;font-size:15px;}
  .comment .when{font-size:12px;color:var(--ink-soft);margin-left:8px;font-weight:400;}
  .comment .what{font-size:16px;line-height:1.7;margin-top:6px;white-space:pre-wrap;}
  .empty-note{color:var(--ink-soft);opacity:.6;font-style:italic;padding:6px 2px;}

  /* 입력 폼 */
  .add{
    margin-top:8px;background:var(--card);border:1px dashed #cdbd93;
    border-radius:10px;padding:16px 18px;
  }
  .add input,.add textarea{
    width:100%;font-family:'Gowun Batang',serif;color:var(--ink);
    background:#fffdf6;border:1px solid #ddcea6;border-radius:8px;
    padding:9px 12px;font-size:15px;margin-bottom:10px;resize:vertical;
  }
  .add textarea{min-height:78px;line-height:1.6;}
  .add input:focus,.add textarea:focus{outline:none;border-color:var(--accent);}

  .btn{
    font-family:'Gowun Batang',serif;font-size:15px;color:#f4ecd8;
    background:var(--accent);border:none;border-radius:22px;
    padding:9px 22px;cursor:pointer;transition:filter .15s,transform .1s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:rgba(58,50,38,.08);color:var(--ink);}
  .btn:disabled{opacity:.5;cursor:default;}

  .bar{max-width:820px;margin:0 auto 14px;display:flex;gap:8px;
    align-items:center;flex-wrap:wrap;}
  .bar .btn{font-size:13px;padding:6px 14px;background:rgba(255,255,255,.09);
    color:#f4ecd8;border:1px solid rgba(255,255,255,.18);border-radius:20px;}
  .bar .btn:hover{background:rgba(255,255,255,.18);filter:none;}
  .status{margin-left:auto;color:#cdbf9e;font-family:'Nanum Pen Script',cursive;
    font-size:18px;}

  .demo-banner{
    max-width:820px;margin:0 auto 14px;background:#5b4a33;color:#f0e5cc;
    border:1px solid #7a6647;border-radius:10px;padding:10px 16px;font-size:13px;
    line-height:1.6;
  }
  .demo-banner b{color:#f6d98a;}

  @media (max-width:640px){
    .sheet{padding:38px 24px 48px;}
    .book-title{font-size:26px;}
    .cur-msg{font-size:18px;}
  }
  @media print{
    body{background:#fff;} .bar,.add,.admin-row,.demo-banner{display:none;}
    .wrap{padding:0;} .sheet{box-shadow:none;}
  }
</style>
</head>
<body>

  <!-- ====== 설정: 백엔드 주소를 여기에 붙여넣으세요 ====== -->
  <script>
    // Google Apps Script 웹앱 URL. 비워두면 '데모 모드'(이 기기에만 저장)로 동작.
    const API_URL = "https://script.google.com/macros/s/AKfycbx_NNxpcfq2oA7qIsPAyMWNcuKZRUwh1GqBI4Wc4pdA0QKrvpnuN-ikc0SljQVbpaAfIQ/exec";
    // 사서/운영자 화면이면 true 로 두면 책 정보를 편집·저장할 수 있어요.
    const ADMIN = true;
  </script>

  <div class="bar">
    <button class="btn" onclick="reload()">↻ 새로고침</button>
    <button class="btn" onclick="window.print()">🖨 인쇄 / PDF</button>
    <span class="status" id="status"></span>
  </div>

  <div id="demoBanner" class="demo-banner" style="display:none">
    <b>데모 모드</b> — 지금은 이 기기의 브라우저에만 댓글이 저장됩니다.
    여러 사람이 공유하려면 함께 드린 안내서대로 백엔드 주소를 <b>API_URL</b>에 넣어주세요.
  </div>

  <div class="wrap">
    <div class="sheet">
      <div class="kicker">이 달의 추천 도서</div>
      <div class="book-title" id="bTitle" data-ph="도서명">불편한 편의점</div>
      <div class="book-author" id="bAuthor" data-ph="저자">김호연</div>
      <div class="rule"></div>

      <div class="cur-label">큐레이션 메시지</div>
      <div class="cur-msg" id="bMsg" data-ph="추천하는 이유를 적어주세요">낯선 사람 사이의 따뜻함과 감정에 감동하여 추천합니다.</div>
      <div class="recommender" id="bRec" data-ph="— 추천자">— 사서 드림</div>

      <div class="admin-row" id="adminRow" style="display:none">
        <button class="btn ghost" id="editBtn" onclick="toggleEdit()">✎ 책 정보 편집</button>
        <button class="btn save-book" id="saveBtn" onclick="saveBook()">저장</button>
      </div>

      <!-- ====== 감상 스레드 ====== -->
      <div class="comments">
        <h2>읽은 사람들의 감상 <span class="cnt" id="cnt"></span></h2>
        <div class="thread-rule"></div>
        <div id="list"><div class="empty-note">아직 감상이 없어요. 첫 감상을 남겨보세요.</div></div>

        <div class="add">
          <input id="cName" maxlength="20" placeholder="이름 또는 별명">
          <textarea id="cBody" maxlength="1000" placeholder="이 책을 읽고 느낀 점을 자유롭게 적어주세요…"></textarea>
          <button class="btn" id="postBtn" onclick="postComment()">감상 남기기</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const statusEl = $('status');
  const LS = 'book-note-' + (API_URL || 'demo');
  const demoMode = !API_URL;

  const bookEls = {title:$('bTitle'),author:$('bAuthor'),msg:$('bMsg'),rec:$('bRec')};

  if (demoMode) $('demoBanner').style.display = 'block';
  if (ADMIN) $('adminRow').style.display = 'flex';

  function flash(m){statusEl.textContent=m;clearTimeout(flash._t);
    flash._t=setTimeout(()=>statusEl.textContent='',1800);}
  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function fmt(ts){const d=new Date(ts);if(isNaN(d))return'';
    const days=['일','월','화','수','목','금','토'];
    return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${days[d.getDay()]}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

  /* ---------- 데이터 계층 (백엔드 or 로컬) ---------- */
  async function fetchData(){
    if(demoMode){
      const d=JSON.parse(localStorage.getItem(LS)||'{}');
      return {book:d.book||null, comments:d.comments||[]};
    }
    const r=await fetch(API_URL,{method:'GET'});
    return await r.json();
  }
  async function sendComment(name,body){
    if(demoMode){
      const d=JSON.parse(localStorage.getItem(LS)||'{}');
      d.comments=d.comments||[];
      d.comments.push({name,body,ts:Date.now()});
      localStorage.setItem(LS,JSON.stringify(d));return;
    }
    await fetch(API_URL,{method:'POST',
      body:JSON.stringify({type:'comment',name,body})});
  }
  async function sendBook(book){
    if(demoMode){
      const d=JSON.parse(localStorage.getItem(LS)||'{}');
      d.book=book;localStorage.setItem(LS,JSON.stringify(d));return;
    }
    await fetch(API_URL,{method:'POST',
      body:JSON.stringify({type:'book',...book})});
  }

  /* ---------- 렌더 ---------- */
  function renderBook(book){
    if(!book)return; // keep default sample text
    if(book.title!==undefined)bookEls.title.textContent=book.title;
    if(book.author!==undefined)bookEls.author.textContent=book.author;
    if(book.msg!==undefined)bookEls.msg.textContent=book.msg;
    if(book.rec!==undefined)bookEls.rec.textContent=book.rec;
  }
  function renderComments(list){
    $('cnt').textContent = list.length?`(${list.length})`:'';
    if(!list.length){$('list').innerHTML=
      '<div class="empty-note">아직 감상이 없어요. 첫 감상을 남겨보세요.</div>';return;}
    list.sort((a,b)=>a.ts-b.ts);
    $('list').innerHTML=list.map(c=>`
      <div class="comment">
        <span class="who">${esc(c.name)||'익명'}</span>
        <span class="when">${fmt(c.ts)}</span>
        <div class="what">${esc(c.body)}</div>
      </div>`).join('');
  }

  async function reload(){
    try{
      flash('불러오는 중…');
      const d=await fetchData();
      renderBook(d.book);
      renderComments(d.comments||[]);
      flash('최신 상태 ✓');
    }catch(e){flash('불러오기 실패');console.error(e);}
  }

  async function postComment(){
    const name=$('cName').value.trim();
    const body=$('cBody').value.trim();
    if(!body){$('cBody').focus();return;}
    $('postBtn').disabled=true;
    try{
      await sendComment(name,body);
      $('cBody').value='';
      flash('감상이 등록됐어요 ✓');
      await reload();
    }catch(e){flash('등록 실패');console.error(e);}
    $('postBtn').disabled=false;
  }

  /* ---------- 관리자: 책 정보 편집 ---------- */
  let editing=false;
  function toggleEdit(){
    editing=!editing;
    ['title','author','msg','rec'].forEach(k=>bookEls[k].setAttribute('contenteditable',editing));
    $('saveBtn').style.display=editing?'inline-block':'none';
    $('editBtn').textContent=editing?'취소':'✎ 책 정보 편집';
    if(editing)bookEls.title.focus();
  }
  async function saveBook(){
    const book={
      title:bookEls.title.textContent.trim(),
      author:bookEls.author.textContent.trim(),
      msg:bookEls.msg.textContent.trim(),
      rec:bookEls.rec.textContent.trim()
    };
    try{await sendBook(book);flash('책 정보 저장됨 ✓');}
    catch(e){flash('저장 실패');console.error(e);}
    toggleEdit();
  }

  // 첫 로드 & 자동 새로고침(공유 모드에서만)
  reload();
  if(!demoMode) setInterval(reload, 15000);
</script>
</body>
</html>
